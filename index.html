<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoxRogue — Voice-Native Dungeon Crawler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      @keyframes danger-pulse {
        0%,100% { box-shadow: 0 0 6px #ff2244, 0 0 12px #ff224466; }
        50%     { box-shadow: 0 0 14px #ff2244, 0 0 28px #ff2244aa; }
      }
      @keyframes log-entry {
        from { opacity:0; transform:translateX(-6px); }
        to   { opacity:1; transform:translateX(0); }
      }
      @keyframes mic-pulse {
        0%,100% { box-shadow: 0 0 0 0 rgba(255,34,68,0.5); }
        50%     { box-shadow: 0 0 0 8px rgba(255,34,68,0); }
      }
      @keyframes damage-flash {
        from { background: rgba(255,34,68,0.15); }
        to   { background: transparent; }
      }
      @keyframes dot-blink {
        0%, 20% { opacity: 0; }
        50% { opacity: 1; }
        100% { opacity: 0; }
      }
       @keyframes waveform-bar {
        0%   { height: 2px; }
        50%  { height: 16px; }
        100% { height: 2px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
