<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoxRogue — Voice-Native Dungeon Crawler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      @keyframes danger-pulse {
        0%,100% { box-shadow: 0 0 6px #ff2244, 0 0 12px #ff224466; }
        50%     { box-shadow: 0 0 14px #ff2244, 0 0 28px #ff2244aa; }
      }
      @keyframes log-entry {
        from { opacity:0; transform:translateX(-6px); }
        to   { opacity:1; transform:translateX(0); }
      }
      @keyframes mic-pulse {
        0%,100% { box-shadow: 0 0 0 0 rgba(255,34,68,0.5); }
        50%     { box-shadow: 0 0 0 8px rgba(255,34,68,0); }
      }
      @keyframes damage-flash {
        from { background: rgba(255,34,68,0.15); }
        to   { background: transparent; }
      }
      @keyframes shimmer {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      @keyframes win-pulse {
        0%, 100% { background: rgba(0,20,10,0.6); }
        50%       { background: rgba(0,40,20,0.8); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
